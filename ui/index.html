<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>What'sDown Settings v4</title>
        <style>
            :root {
                --bg: #111b21;
                --panel: #202c33;
                --hover: #2a3942;
                --text: #e9edef;
                --sub: #8696a0;
                --accent: #25d366;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family:
                    Segoe UI,
                    sans-serif;
            }
            body {
                background: var(--bg);
                color: var(--text);
                height: 100vh;
                overflow: hidden;
            }
            .app {
                display: flex;
                height: 100vh;
            }
            .sidebar {
                width: 360px;
                border-right: 1px solid #1c262c;
            }
            .header {
                padding: 24px;
            }
            .searchwrap {
                position: relative;
            }
            .searchicon {
                position: absolute;
                left: 14px;
                top: 50%;
                transform: translateY(-50%);
                width: 18px;
                height: 18px;
                color: var(--sub);
            }
            .search {
                width: 100%;
                padding: 12px 12px 12px 42px;
                border: none;
                border-radius: 12px;
                background: var(--panel);
                color: white;
            }
            .item {
                display: flex;
                gap: 12px;
                padding: 14px;
                margin: 2px 8px;
                border-radius: 12px;
                cursor: pointer;
                position: relative;
                transition: 0.15s;
            }
            .item:hover,
            .row:hover,
            .card:hover {
                background: var(--hover);
            }
            .item.active {
                background: var(--panel);
            }
            .item.active:before {
                content: "";
                position: absolute;
                left: 0;
                top: 8px;
                bottom: 8px;
                width: 4px;
                background: var(--accent);
                border-radius: 0 8px 8px 0;
            }
            .item-u {
                display: flex;
                color: red;
                gap: 12px;
                padding: 14px;
                margin: 2px 8px;
                border-radius: 12px;
                cursor: pointer;
                position: relative;
                transition: 0.15s;
            }
            .item-u:hover,
            .item-u.active {
                background: #530000;
            }
            .item.active:before {
                content: "";
                position: absolute;
                left: 0;
                top: 8px;
                bottom: 8px;
                width: 4px;
                background: var(--accent);
                border-radius: 0 8px 8px 0;
            }
            .meta small {
                color: var(--sub);
            }
            .sep {
                height: 1px;
                background: #2a3942;
                margin: 12px 16px;
            }
            .content {
                flex: 1;
                display: flex;
                flex-direction: column;
            }
            .top {
                height: 72px;
                border-bottom: 1px solid #1c262c;
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 0 18px;
            }
            .back {
                width: 42px;
                height: 42px;
                border: none;
                border-radius: 50%;
                background: transparent;
                color: white;
                font-size: 22px;
                cursor: pointer;
            }
            .back:hover {
                background: var(--hover);
            }
            .page {
                flex: 1;
                overflow: auto;
                padding: 24px;
            }
            .home {
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
            }
            .home p,
            .desc,
            .crumb {
                color: var(--sub);
            }
            .section {
                margin: 24px 0 12px;
                color: var(--sub);
                font-weight: 600;
            }
            .row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 14px;
                border-radius: 10px;
                cursor: pointer;
            }
            .arrow {
                font-size: 26px;
                color: var(--sub);
            }
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
                gap: 12px;
            }
            .card {
                background: var(--panel);
                padding: 14px;
                border-radius: 14px;
                transition: 0.15s;
            }
            .btn {
                background: var(--accent);
                border: none;
                padding: 8px 12px;
                border-radius: 999px;
                cursor: pointer;
                margin-top: 8px;
            }
            .toggle {
                position: relative;
                width: 50px;
                height: 26px;
            }
            .toggle input {
                display: none;
            }
            .slider {
                position: absolute;
                inset: 0;
                background: #555;
                border-radius: 99px;
            }
            .slider:before {
                content: "";
                position: absolute;
                width: 20px;
                height: 20px;
                left: 3px;
                top: 3px;
                background: white;
                border-radius: 50%;
                transition: 0.15s;
            }
            input:checked + .slider {
                background: var(--accent);
            }
            input:checked + .slider:before {
                transform: translateX(24px);
            }
            .dialogbg {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.55);
                align-items: center;
                justify-content: center;
            }
            .dialog {
                background: var(--panel);
                padding: 20px;
                border-radius: 18px;
                width: 500px;
            }
            .toast {
                display: none;
                position: fixed;
                right: 20px;
                bottom: 20px;
                background: var(--panel);
                padding: 12px;
                border-radius: 12px;
            }
        </style>
    </head>
    <body>
        <div class="app">
            <div class="sidebar">
                <div class="header">
                    <h1>Settings</h1>
                    <div class="searchwrap">
                        <svg class="searchicon" viewBox="0 0 24 24">
                            <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2" />
                            <path d="M20 20l-4-4" stroke="currentColor" stroke-width="2" /></svg
                        ><input class="search" placeholder="Search settings..." />
                    </div>
                </div>
                <div class="item" onclick="openPage('plugins',this)">
                    <div>🚀</div>
                    <div class="meta">
                        <div>Plugins</div>
                        <small>Loaded: 0, Enabled: 0</small>
                    </div>
                </div>
                <div class="item" onclick="openPage('themes',this)">
                    <div>🎨</div>
                    <div class="meta">
                        <div>Themes</div>
                        <small>Loaded: 0, Used: None</small>
                    </div>
                </div>
                <div class="item" onclick="openPage('fonts',this)">
                    <div>Aa</div>
                    <div class="meta">
                        <div>Fonts</div>
                        <small>Loaded: 0, Used: None</small>
                    </div>
                </div>
                <div class="item" onclick="openPage('about',this)">
                    <div><img src="assets/whatsdown_light.png" height="35" width="35"></div>
                    <div class="meta">
                        <div>What'sDown</div>
                        <small>Version 1.0R </small>
                    </div>
                </div>
                <div class="sep"></div>
                <div class="item-u" onclick="openPage('uninstall',this)">
                    <div>🗑️</div>
                    <div class="meta">
                        <div>Uninstall</div>
                        <small>Uninstall What'sDown and remove it's data</small>
                    </div>
                </div>
            </div>
            <div class="content">
                <div class="top">
                    <button id="back" class="back" onclick="goHome()">←</button>
                    <div>
                        <div class="crumb" id="crumb">Home</div>
                        <h2 id="title">What'sDown</h2>
                    </div>
                </div>
                <div class="page" id="page"></div>
            </div>
        </div>
        <div class="dialogbg" id="dlg">
            <div class="dialog">
                <h2 id="dlgtitle"></h2>
                <div id="dlgbody"></div>
                <br /><button class="btn" onclick="closeDialog()">Close</button>
            </div>
        </div>
        <div class="toast" id="toast"></div>
        <script>
            const page = document.getElementById("page"),
                back = document.getElementById("back");
            function sb(ph) {
                return `<div class=searchwrap><svg class=searchicon viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><path d="M20 20l-4-4" stroke="currentColor" stroke-width="2"/></svg><input class=search placeholder="${ph}"></div>`;
            }
            function goHome() {
                document.querySelectorAll(".item").forEach((x) => x.classList.remove("active"));
                back.style.visibility = "hidden";
                crumb.innerText = "Home";
                title.innerText = "What'sDown";
                page.innerHTML = `<div class=home><img src="assets/whatsdown_light.png" width=120><h1>What'sDown</h1><p>Select a category from the left panel.</p></div>`;
            }
            function openPage(n, e) {
                document.querySelectorAll(".item").forEach((x) => x.classList.remove("active"));
                e.classList.add("active");
                back.style.visibility = "visible";
                crumb.innerText = "Settings";
                if (n === "plugins") {
                    title.innerText = "Plugins";
                    page.innerHTML =
                        sb("Search plugins") +
                        `<div class=section>Store</div><div class=row onclick="openOpenWings()"><div><b>OpenWings</b><div class=desc>Get plugins here</div></div><span class=arrow>›</span></div><div class=row><div><b>Install Plugin</b><div class=desc>Install from file</div></div><span class=arrow>›</span></div><div class=section>Installed Plugins</div><div style="max-height:300px;overflow:auto"><div class=card><b>NoTyping</b><div class=desc>Hide typing indicator</div><button class=btn onclick="toast('Enabled')">Enable</button></div><br><div class=card><b>WhatsRPC</b><div class=desc>Rich Presence</div><button class=btn>Settings</button></div></div>`;
                }
                if (n === "themes") {
                    title.innerText = "Themes";
                    page.innerHTML =
                        sb("Search themes") +
                        `<div class=row onclick="themeDialog()"><div><b>Select Theme</b><div class=desc>Current: Midnight Blue</div></div><span class=arrow>›</span></div><div style="max-height:350px;overflow:auto"><div class=card>Midnight Blue</div><br><div class=card>Dark+</div></div>`;
                }
                if (n === "fonts") {
                    title.innerText = "Fonts";
                    page.innerHTML =
                        sb("Search fonts") +
                        `<div style="max-height:350px;overflow:auto"><div class=card>Default</div><br><div class=card>Noto Sans</div></div><div class=section>Settings</div><div class=row><span>Enable Custom Fonts</span><label class=toggle><input type=checkbox><span class=slider></span></label></div>`;
                }
                if (n === "about") {
                    title.innerText = "What'sDown";
                    page.innerHTML = `<div class=card><b>Version:</b> 1.0R<br><b>Binary:</b> Runtime String<br><b>User ID:</b> 12345<br><b>Phone:</b> Example<br><b>Contacts:</b> 0</div><div class=section>Resources</div><div class=row onclick="openGit"><span>GitHub</span><span class=arrow>›</span></div><div class=row onclick="checkUpdate"><span>Check for Updates</span><span class=arrow>›</span></div>`;
                }
                if (n === "uninstall") {
                    title.innerText = "Uninstall";
                    page.innerHTML = `<div class=card><b>Remove What'sDown</b><div class=desc>Delete plugins, themes and settings.</div><button class=btn onclick="toast('Uninstall requested')">Uninstall</button></div>`;
                }
            }
            function openOpenWings() {
                crumb.innerText = "Plugins > OpenWings";
                title.innerText = "OpenWings";
                page.innerHTML =
                    sb("Search OpenWings") +
                    `<div class=section>Featured</div><div class=grid><div class=card><b>NoTyping</b><div class=desc>Hide typing status</div><button class=btn onclick="toast('Installed')">Install</button></div><div class=card><b>WhatsRPC</b><div class=desc>Rich Presence for WhatsApp, being customizable</div><button class=btn onclick="toast('Installed')">Install</button></div><div class=card><b>Game Overlay</b><div class=desc>Similar to Discord's overlay, displaying a new message notification, call members, and being able to do actions on the overlay. To open if, press [ + W</div><button class=btn onclick="toast('Installed')">Install</button></div></div>`;
            }
            function openGit() {
                window.location.href = "https://github.com/amplevarious/whatsdown"
            }
            function themeDialog() {
                dlgtitle.innerText = "Select Theme";
                dlgbody.innerHTML = `<label><input type=radio name=theme checked> Midnight Blue</label><br><br><label><input type=radio name=theme> Dark+</label><br><br><label><input type=radio name=theme> Light</label>`;
                dlg.style.display = "flex";
            }
            function closeDialog() {
                dlg.style.display = "none";
            }
            function toast(t) {
                let x = document.getElementById("toast");
                x.innerText = t;
                x.style.display = "block";
                setTimeout(() => (x.style.display = "none"), 2200);
            }
            goHome();
        </script>
    </body>
</html>
